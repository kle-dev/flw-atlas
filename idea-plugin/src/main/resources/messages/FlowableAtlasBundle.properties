# Flowable Atlas — user-visible strings referenced from plugin.xml and shared code.
# Conventions: Title Case for action texts and dialog titles; ellipsis only when the action always
# needs further input; sentence case for notification titles (no "Flowable Atlas" prefix — the
# notification group already carries it).

## Tools menu group
group.Flowable.Menu.text=Flowable Atlas
group.Flowable.Menu.description=Flowable Atlas actions

## Actions — open
action.Flowable.OpenAtlasHub.text=Atlas Hub
action.Flowable.OpenAtlasHub.description=Show the Atlas Hub tool window: model-index status, generated explorers and Flowable Design sync in one place
action.Flowable.OpenAtlasExplorer.text=Open Atlas Explorer
action.Flowable.OpenAtlasExplorer.description=Open an already-generated Atlas explorer as a center editor tab (like a DB table); no regeneration, no browser
action.Flowable.OpenExpressionPlayground.text=Open Expression Playground
action.Flowable.OpenExpressionPlayground.description=Show the Flowable Expressions tool window to validate and evaluate backend/frontend expressions

## Actions — generate
group.Flowable.Generate.text=Generate
group.Flowable.Generate.description=Generate Atlas artifacts, model constants and Liquibase changelogs from the project's Flowable models
group.Flowable.GenerateLiquibase.text=Liquibase
group.Flowable.GenerateLiquibase.description=Generate Liquibase changelogs from Flowable data objects or app exports
action.Flowable.GenerateAtlasExplorer.text=Generate Atlas Explorer…
action.Flowable.GenerateAtlasExplorer.description=Map the whole project into the Atlas artifacts selected in Settings (interactive explorer HTML, Markdown, graph JSON)
action.Flowable.GenerateModelConstants.text=Generate Model Constants…
action.Flowable.GenerateModelConstants.description=Generate a Java class with all Flowable model keys as constants (kept in sync)
action.Flowable.GenerateLiquibaseFromDataObject.text=From Data Object…
action.Flowable.GenerateLiquibaseFromDataObject.description=Pick an indexed data object and write its Liquibase changelog (extracted from the bundling app export, or synthesized from its fields) into src/main/resources/liquibase
action.Flowable.GenerateLiquibaseFromApps.text=From App(s)
action.Flowable.GenerateLiquibaseFromApps.description=Extract every bundled Liquibase changelog from every Design-export app zip in the project into src/main/resources/liquibase

## Actions — Flowable Design
action.Flowable.PullFromDesign.text=Pull from Flowable Design
action.Flowable.PullFromDesign.description=Download the configured app's export ZIP from Flowable Design into the project (the index refreshes automatically)
action.Flowable.ConfigureDesignConnection.text=Configure Design Connection…
action.Flowable.ConfigureDesignConnection.description=Open the Connections settings page: Flowable Design server, credentials, workspace/app and target folder

## Actions — maintenance
action.Flowable.RebuildModelIndex.text=Rebuild Model Index
action.Flowable.RebuildModelIndex.description=Rescan the project's Flowable models and rebuild the key index
action.Flowable.DumpKeyIndex.text=Dump Key Index (Internal)
action.Flowable.DumpKeyIndex.description=Rescan the project and show a per-type breakdown of all indexed Flowable model keys

