org.gradle.jvmargs=-Xmx2g -XX:+UseParallelGC

# The IntelliJ Platform provides the Kotlin stdlib; don't add our own.
kotlin.stdlib.default.dependency=false

# Compile toolchain is JDK 21 (see build.gradle.kts jvmToolchain(21)). No hardcoded JDK path so the
# build is portable: Gradle auto-detects installed JDKs (sdkman/asdf/homebrew/standard locations).
# If your JDK 21 isn't auto-detected, add it in your *local* ~/.gradle/gradle.properties (not this
# committed file) via `org.gradle.java.installations.paths=/path/to/jdk21`, or set JAVA_HOME.
# NOTE: to just *run* Atlas you don't need Gradle at all — use the self-contained CLI fat-jar
# (java -jar cli-<version>-all.jar …); only Java 21 is required on the target.
